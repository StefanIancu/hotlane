version: 2

project_name: hotlane

builds:
  - main: ./cmd/hotlane
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

brews:
  - name: hotlane
    repository:
      owner: StefanIancu
      name: homebrew-hotlane
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://hotlane.dev
    description: "Instant verified deploys: fork the live app, verify, flip traffic"
    license: MIT
    install: bin.install "hotlane"
    test: |
      assert_match "hotlane", shell_output("#{bin}/hotlane version")

changelog:
  use: github
  filters:
    exclude:
      - "^docs"
      - "^bench"

release:
  draft: false
  prerelease: auto

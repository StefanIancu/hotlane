name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: gofmt
        run: test -z "$(gofmt -l cmd internal)"
      - name: vet
        run: go vet ./...
      - name: end-to-end (real Docker lifecycle)
        run: ./test/e2e.sh
